[package]
name = "weensyos"
version = "0.1.0"
authors = ["Anton Melnychuk <anton.melnychuk@yale.edu>"]
edition = "2018"

[dependencies]
bootloader = { version = "0.9.9", features = ["map_physical_memory"] }
lazy_static = { version = "1.4.0", features = ["spin_no_std"] }
pc-keyboard = "0.5.0"
uart_16550 = "0.2.0"
volatile = "0.2.6"
pic8259 = "0.10.1"
x86_64 = "0.14.2"
spin = "0.5.2"
log = "0.4.17"

[package.metadata.bootimage]
test-args = [
    "-device", "isa-debug-exit,iobase=0xf4,iosize=0x04", 
    "-serial", "stdio",
    "-display", "none"
]
test-timeout = 300                  # in seconds
test-success-exit-code = 33         # (0x10 << 1) | 1
# Run qemu auto-configurations
run-command = ["qemu-system-x86_64", "-drive", "format=raw,file={}"]
run-args = [
    "-device", "isa-debug-exit,iobase=0xf4,iosize=0x04", 
    "-usb",
    "-usbdevice", "tablet",
    "-display", "curses",
    "-full-screen",
    "-serial", "file:.logs"
]

[[test]]
name = "should_panic"
harness = false

[[test]]
name = "stack_overflow"
harness = false
