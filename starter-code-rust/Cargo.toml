[package]
name = "weensyos"
version = "0.1.0"
authors = ["Anton Melnychuk <anton.melnychuk@yale.edu>"]
edition = "2018"

[dependencies]
lazy_static = { version = "1.4.0", features = ["spin_no_std"] }
pc-keyboard = "0.5.0"
bootloader = "0.9.8"
uart_16550 = "0.2.0"
volatile = "0.2.6"
pic8259 = "0.10.1"
x86_64 = "0.14.2"
spin = "0.5.2"

[package.metadata.bootimage]
test-args = [
    "-device", "isa-debug-exit,iobase=0xf4,iosize=0x04", 
    "-serial", "stdio",
    "-display", "none"
]
test-timeout = 300                  # in seconds
test-success-exit-code = 33         # (0x10 << 1) | 1

[[test]]
name = "should_panic"
harness = false

[[test]]
name = "stack_overflow"
harness = false